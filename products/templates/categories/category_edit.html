{% extends "base.html" %}

{% block title %}Edit Category{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
  <h2 class="mb-4">Edit Category</h2>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label fw-bold">Code</label>
        <input type="text" name="code" class="form-control font-monospace text-uppercase" required
               maxlength="10" value="{{ post.code|default:category.code }}">
      </div>
      <div class="col-md-8">
        <label class="form-label fw-bold">Description</label>
        <input type="text" name="description" class="form-control" required
               maxlength="100" value="{{ post.description|default:category.description }}">
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
