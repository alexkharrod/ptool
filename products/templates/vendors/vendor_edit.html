{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
  <h2 class="mb-4">Edit Vendor</h2>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold">Vendor Name</label>
      <input type="text" name="name" class="form-control" required
             value="{{ request.POST.name|default:vendor.name }}">
      <div class="form-text text-muted">Duplicates are checked automatically.</div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold">Country</label>
      <select name="country" class="form-select">
        {% for code, label in country_choices %}
        <option value="{{ code }}"
          {% if request.POST.country == code %}selected
          {% elif not request.POST and vendor.country == code %}selected{% endif %}>
          {{ label }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'vendor_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
