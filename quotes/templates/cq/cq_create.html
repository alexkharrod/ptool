{% extends "base.html" %}
{% block title %}New Quote{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:640px;">
    <a href="{% url 'cq_list' %}" class="text-muted small">← Back to Quotes</a>
    <h2 class="mt-2 mb-4">New Quote</h2>

    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Customer Name <span class="text-danger">*</span></label>
            <input type="text" name="customer_name" class="form-control"
                   value="{{ posted.customer_name|default:'' }}" required autofocus>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Rep</label>
                <div class="d-flex gap-1 align-items-center">
                    <select name="rep" id="repSelect" class="form-select">
                        <option value="">— none —</option>
                        {% for r in reps %}
                        <option value="{{ r.pk }}" {% if posted.rep == r.pk|stringformat:"s" %}selected{% endif %}>
                            {{ r.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-secondary btn-sm text-nowrap"
                            onclick="toggleNewRep()" title="Add new rep">＋</button>
                </div>
                <div id="newRepPanel" class="mt-2" style="display:none;">
                    <div class="input-group input-group-sm mb-1">
                        <input type="text" id="newRepName" class="form-control" placeholder="Full name…">
                        <input type="text" id="newRepInitials" class="form-control" placeholder="Initials" style="max-width:70px;">
                        <button type="button" class="btn btn-primary" onclick="addRep()">Add</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="toggleNewRep()">Cancel</button>
                    </div>
                    <div id="newRepError" class="text-danger small mt-1" style="display:none;"></div>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Date</label>
                <input type="date" name="date" class="form-control"
                       value="{{ posted.date|default:today|date:'Y-m-d' }}">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Notes</label>
            <textarea name="notes" class="form-control" rows="3">{{ posted.notes|default:'' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-lg">Create &amp; Add Items →</button>
            <a href="{% url 'cq_list' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

<script>
const CSRF = '{{ csrf_token }}';

function toggleNewRep() {
    const panel = document.getElementById('newRepPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') document.getElementById('newRepName').focus();
}

function addRep() {
    const name = document.getElementById('newRepName').value.trim();
    const initials = document.getElementById('newRepInitials').value.trim();
    const errEl = document.getElementById('newRepError');
    if (!name) { errEl.textContent = 'Name is required.'; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';

    fetch('/quotes/cq/rep-add/', {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, initials }),
    })
    .then(r => r.json())
    .then(data => {
        if (!data.ok) { errEl.textContent = data.error || 'Error'; errEl.style.display = 'block'; return; }
        const sel = document.getElementById('repSelect');
        let opt = sel.querySelector(`option[value="${data.pk}"]`);
        if (!opt) {
            opt = new Option(data.name, data.pk);
            sel.appendChild(opt);
        }
        sel.value = data.pk;
        document.getElementById('newRepName').value = '';
        document.getElementById('newRepInitials').value = '';
        document.getElementById('newRepPanel').style.display = 'none';
    });
}

// Allow Enter key in new rep inputs
document.getElementById('newRepName').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addRep(); }
});
document.getElementById('newRepInitials').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addRep(); }
});
</script>
{% endblock %}
