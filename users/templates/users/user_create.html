{% extends "base.html" %}
{% block title %}New User{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>New User</h4>
      </div>
      <div class="card-body">

        {% if messages %}
          {% for msg in messages %}
          <div class="alert alert-danger alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label">First Name <span class="text-danger">*</span></label>
              <input type="text" name="first_name" class="form-control" value="{{ post.first_name|default:'' }}" required>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Last Name <span class="text-danger">*</span></label>
              <input type="text" name="last_name" class="form-control" value="{{ post.last_name|default:'' }}" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" value="{{ post.email|default:'' }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Temporary Password <span class="text-danger">*</span></label>
            <input type="text" name="password" class="form-control font-monospace" placeholder="They'll be asked to change this on first login" required>
            <div class="form-text">Must be at least 12 characters, not too common.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Section Access</label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="access_products" id="ap"
                  {% if post.access_products %}checked{% endif %}>
                <label class="form-check-label" for="ap">Products</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="access_quotes" id="aq"
                  {% if post.access_quotes %}checked{% endif %}>
                <label class="form-check-label" for="aq">Quotes</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="access_scouting" id="as"
                  {% if post.access_scouting %}checked{% endif %}>
                <label class="form-check-label" for="as">Scouting</label>
              </div>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Shipments Access</label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="access_shipments" id="ashp"
                  {% if post.access_shipments %}checked{% endif %}>
                <label class="form-check-label" for="ashp">View only <small class="text-muted">(no costs)</small></label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="access_shipments_logistics" id="asl"
                  {% if post.access_shipments_logistics %}checked{% endif %}>
                <label class="form-check-label" for="asl">Logistics <small class="text-muted">(add/edit + costs)</small></label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Create User</button>
            <a href="{% url 'user_manage' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
